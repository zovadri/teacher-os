name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /teacher-os
      - run: |
          touch out/.nojekyll
          cd out
          git init
          git config user.name zovadri
          git config user.email zovadri@gmail.com
          git add -A
          git commit -m "deploy"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/zovadri/teacher-os.git HEAD:gh-pages --force
